<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bet Book</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--hub-bg, #f8fafc);
      --surface: var(--hub-surface, #ffffff);
      --text: var(--hub-text, #111827);
      --muted: var(--hub-text-muted, #64748b);
      --border: var(--hub-border, #e2e8f0);
      --accent: var(--hub-primary, #111827);
      --accent-fg: var(--hub-primary-fg, #ffffff);
      --accent-hover: var(--hub-primary-hover, #374151);
      --green: #047857;
      --green-bg: #d1fae5;
      --amber: #b45309;
      --amber-bg: #fef3c7;
      --red: #b91c1c;
      --red-bg: #fee2e2;
      --blue: #1d4ed8;
      --blue-bg: #dbeafe;
      --radius: var(--hub-radius, 8px);
      --shadow: 0 1px 3px rgba(15, 23, 42, .08);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: var(--hub-font-size, 15px);
      line-height: 1.45;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: default; opacity: .55; }
    .app { max-width: 1120px; margin: 0 auto; padding: 16px; }
    header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      padding: 18px 0 14px;
    }
    h1 { font-size: 1.55rem; line-height: 1.1; letter-spacing: 0; }
    .sub { color: var(--muted); margin-top: 4px; font-size: .92rem; }
    .btn {
      border: 1px solid transparent; border-radius: 8px; padding: 9px 13px;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      font-weight: 700; font-size: .88rem; min-height: 38px;
    }
    .btn-primary { background: var(--accent); color: var(--accent-fg); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost { background: var(--surface); color: var(--text); border-color: var(--border); }
    .btn-danger { background: var(--red); color: white; }
    .btn-success { background: var(--green); color: white; }
    .btn-small { min-height: 30px; padding: 5px 9px; font-size: .78rem; }

    .stats {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin: 8px 0 14px;
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; box-shadow: var(--shadow); min-height: 76px;
    }
    .stat b { display: block; font-size: 1.45rem; line-height: 1; }
    .stat span { color: var(--muted); font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }

    .tabs { display: flex; gap: 6px; background: var(--border); border-radius: 10px; padding: 4px; margin-bottom: 14px; }
    .tab {
      flex: 1; border: 0; border-radius: 8px; padding: 8px; background: transparent; color: var(--muted);
      font-weight: 800; font-size: .84rem;
    }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      border: 1px solid var(--border); background: var(--surface); color: var(--muted); border-radius: 999px;
      padding: 6px 10px; font-size: .78rem; font-weight: 800;
    }
    .chip.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

    .grid { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 14px; align-items: start; }
    .list { display: grid; gap: 10px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow);
    }
    .bet-card { cursor: pointer; transition: border-color .15s, transform .15s; }
    .bet-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .bet-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(17, 24, 39, .08); }
    .bet-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .bet-title { font-weight: 800; font-size: 1rem; overflow-wrap: anywhere; }
    .meta { color: var(--muted); font-size: .8rem; margin-top: 4px; }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
    .badge { border-radius: 999px; padding: 3px 8px; font-size: .72rem; font-weight: 800; white-space: nowrap; }
    .badge-neutral { background: #f1f5f9; color: #334155; }
    .badge-blue { background: var(--blue-bg); color: var(--blue); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .participants { display: grid; gap: 7px; margin-top: 12px; }
    .participant {
      border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: grid;
      grid-template-columns: 30px minmax(0, 1fr); gap: 8px; align-items: start;
    }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%; color: white; display: inline-flex;
      align-items: center; justify-content: center; font-weight: 900; font-size: .75rem; flex: 0 0 auto;
    }
    .prediction { color: var(--muted); font-size: .84rem; overflow-wrap: anywhere; white-space: pre-wrap; }
    .winner { border-color: var(--green); background: var(--green-bg); }
    .side { font-size: .75rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: .03em; }
    .detail h2 { font-size: 1.05rem; margin-bottom: 6px; overflow-wrap: anywhere; }
    .section-title { color: var(--muted); font-size: .72rem; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; margin: 16px 0 7px; }
    .empty { text-align: center; color: var(--muted); padding: 34px 16px; border: 1px dashed var(--border); border-radius: var(--radius); background: var(--surface); }
    .stack { display: grid; gap: 8px; }
    .receipt { border: 1px solid var(--border); border-radius: 8px; padding: 9px; }
    .receipt a { color: var(--blue); font-weight: 700; overflow-wrap: anywhere; }
    .score-row { display: grid; grid-template-columns: minmax(0, 1fr) repeat(4, 54px); gap: 8px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .score-row:last-child { border-bottom: 0; }
    .score-num { text-align: right; font-weight: 900; }
    .score-labels { color: var(--muted); font-size: .72rem; font-weight: 900; text-transform: uppercase; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .55); display: flex; align-items: flex-end; justify-content: center; z-index: 20; }
    .modal { width: 100%; max-width: 720px; max-height: 92vh; overflow: auto; background: var(--surface); border-radius: 12px 12px 0 0; padding: 18px; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .field { margin-bottom: 11px; }
    label { display: block; font-size: .72rem; color: var(--muted); font-weight: 900; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px; background: white; color: var(--text);
      padding: 9px 10px; outline: none;
    }
    textarea { min-height: 76px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    .party-editor { border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .error { background: var(--red-bg); color: var(--red); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; font-weight: 700; }
    .loading { padding: 40px; color: var(--muted); text-align: center; }

    @media (max-width: 840px) {
      .grid, .stats, .form-grid { grid-template-columns: 1fr; }
      header { align-items: stretch; flex-direction: column; }
      header .btn { width: 100%; }
      .score-row { grid-template-columns: minmax(0, 1fr) repeat(4, 42px); }
    }
    @media (min-width: 560px) {
      .modal-backdrop { align-items: center; padding: 18px; }
      .modal { border-radius: 12px; }
    }
  </style>
  <base href="/run/bet-book/">
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Bet Book</h1>
        <div class="sub">Long-term calls, friendly wagers, locked predictions, and receipts.</div>
      </div>
      <button class="btn btn-primary" id="new-bet-btn">New bet</button>
    </header>
    <div id="root"><div class="loading">Loading...</div></div>
  </div>

  <script type="module">
    import { createDbHelper, esc, formatRelativeDate, hubConfirm, initial, memberColor } from "/hub-sdk.js";
    import {
      CATEGORIES, DISPUTE_RULES, TERM_TYPES, appStats, buildScoreboard, dueStatus,
      formatTerms, labelFor, safeReceiptUrl, sortBets, validateBetDraft
    } from "./logic.js";

    const CONTEXT = window.__CONTEXT_URL ?? "";
    const DB = window.__DB_URL ?? "";
    const APPEND_RECORD = window.__APPEND_RECORD_URL ?? "/run/bet-book/api/append-record";
    const CURRENT = window.__CURRENT_MEMBER ?? null;
    const dbq = createDbHelper(DB);

    let members = [];
    let bets = [];
    let participants = [];
    let evidence = [];
    let amendments = [];
    let votes = [];
    let settlementWinners = [];
    let selectedId = null;
    let tab = "open";
    let filter = "all";

    const root = document.getElementById("root");
    document.getElementById("new-bet-btn").addEventListener("click", () => openBetModal());

    async function loadMembers() {
      if (!CONTEXT) {
        members = [
          { id: "demo-1", name: "Alex", role: "adult" },
          { id: "demo-2", name: "Jordan", role: "adult" },
          { id: "demo-3", name: "Casey", role: "child" },
        ];
        return;
      }
      try {
        const res = await fetch(`${CONTEXT}?keys=family.members`);
        members = ((await res.json())["family.members"]) ?? [];
      } catch {
        members = [];
      }
    }

    async function loadData() {
      const [b, p, e, a, v, w] = await Promise.all([
        dbq("SELECT * FROM app_bet_book__bets ORDER BY created_at DESC"),
        dbq("SELECT * FROM app_bet_book__participants ORDER BY created_at ASC"),
        dbq("SELECT * FROM app_bet_book__evidence ORDER BY added_at DESC"),
        dbq("SELECT * FROM app_bet_book__amendments ORDER BY added_at DESC"),
        dbq("SELECT * FROM app_bet_book__settlement_votes ORDER BY created_at DESC"),
        dbq("SELECT * FROM app_bet_book__settlement_winners ORDER BY created_at ASC"),
      ]);
      bets = b.rows ?? [];
      participants = (p.rows ?? []).map(row => ({ ...row, is_winner: !!row.is_winner }));
      evidence = e.rows ?? [];
      amendments = a.rows ?? [];
      votes = v.rows ?? [];
      settlementWinners = w.rows ?? [];
      if (!selectedId || !bets.some(bet => bet.id === selectedId)) selectedId = bets[0]?.id ?? null;
    }

    function betParticipants(betId) { return participants.filter(p => p.bet_id === betId); }
    function betEvidence(betId) { return evidence.filter(item => item.bet_id === betId); }
    function betAmendments(betId) { return amendments.filter(item => item.bet_id === betId); }
    function currentId() { return CURRENT?.id ?? members[0]?.id ?? "local"; }
    function memberName(memberId) { return members.find(m => m.id === memberId)?.name ?? memberId ?? "Unknown"; }
    function now() { return new Date().toISOString(); }
    function winnerIds(betId) {
      return new Set(settlementWinners.filter(row => row.bet_id === betId).map(row => row.participant_id));
    }

    async function appendRecord(name, data) {
      const res = await fetch(`${APPEND_RECORD}/${encodeURIComponent(name)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.error) throw new Error(json.error || "Append failed");
      return json;
    }

    async function saveBet(draft) {
      const validation = validateBetDraft(draft);
      if (!validation.valid) throw new Error(validation.error);
      const id = crypto.randomUUID();
      const at = now();
      await dbq(
        `INSERT INTO app_bet_book__bets
         (id, title, category, terms_type, terms_text, review_date, dispute_rule, status, locked_at, created_by, created_at, updated_at)
         VALUES (?, ?, ?, ?, ?, ?, ?, 'open', ?, ?, ?, ?)`,
        [
          id, validation.title, draft.category, draft.terms_type, draft.terms_text || null,
          draft.review_date || null, draft.dispute_rule, draft.locked ? at : null, currentId(), at, at,
        ]
      );
      for (const party of validation.participants) {
        await appendRecord("participants", {
          bet_id: id,
          member_id: party.member_id || null,
          member_name: party.member_name,
          side_label: party.side_label || "Prediction",
          prediction: party.prediction,
        });
      }
      selectedId = id;
      await reload();
    }

    async function addEvidence(betId, data) {
      const label = data.label.trim();
      if (!label) throw new Error("Name the receipt.");
      await appendRecord("evidence", { bet_id: betId, kind: data.kind, label, url: data.url || null, notes: data.notes || null });
      await reload();
    }

    async function addAmendment(betId, body) {
      const text = body.trim();
      if (!text) throw new Error("Write the amendment.");
      await appendRecord("amendments", { bet_id: betId, body: text });
      await dbq("UPDATE app_bet_book__bets SET updated_at = ? WHERE id = ?", [now(), betId]);
      await reload();
    }

    async function markReady(betId) {
      await dbq("UPDATE app_bet_book__bets SET status = 'ready', updated_at = ? WHERE id = ?", [now(), betId]);
      await reload();
    }

    async function settleBet(betId, winners, summary) {
      if (!summary.trim()) throw new Error("Add a settlement note.");
      const at = now();
      await dbq(
        "UPDATE app_bet_book__bets SET status = 'settled', resolved_at = ?, resolved_by = ?, outcome_summary = ?, updated_at = ? WHERE id = ?",
        [at, currentId(), summary.trim(), at, betId]
      );
      for (const participantId of winners) {
        await appendRecord("settlement_winners", { bet_id: betId, participant_id: participantId });
      }
      await appendRecord("settlement_votes", { bet_id: betId, vote: "settled", notes: summary.trim() });
      await reload();
    }

    async function voidBet(betId) {
      const ok = await hubConfirm("Void this bet?", { description: "It will stay in history, but nobody gets a win or loss.", confirmLabel: "Void bet" });
      if (!ok) return;
      await dbq("UPDATE app_bet_book__bets SET status = 'voided', updated_at = ? WHERE id = ?", [now(), betId]);
      await reload();
    }

    async function reload() {
      await loadData();
      render();
    }

    function visibleBets() {
      let list = bets;
      if (tab === "open") list = bets.filter(b => b.status === "open" || b.status === "ready");
      if (tab === "history") list = bets.filter(b => b.status === "settled" || b.status === "voided");
      if (filter === "overdue") list = list.filter(b => dueStatus(b).tone === "danger");
      if (filter === "soon") list = list.filter(b => dueStatus(b).tone === "warning");
      if (filter !== "all" && !["overdue", "soon"].includes(filter)) list = list.filter(b => b.category === filter);
      return sortBets(list);
    }

    function render() {
      const stats = appStats(bets);
      const selected = bets.find(b => b.id === selectedId) ?? null;
      root.innerHTML = `
        <section class="stats">
          <div class="stat"><b>${stats.open}</b><span>Open wagers</span></div>
          <div class="stat"><b>${stats.overdue}</b><span>Need judgment</span></div>
          <div class="stat"><b>${stats.settled}</b><span>Settled</span></div>
          <div class="stat"><b>${stats.longestOpen ? esc(formatRelativeDate(stats.longestOpen.created_at)) : "-"}</b><span>Longest open</span></div>
        </section>
        <nav class="tabs">
          ${tabButton("open", "Open")}
          ${tabButton("scoreboard", "Scoreboard")}
          ${tabButton("history", "History")}
        </nav>
        ${tab === "scoreboard" ? renderScoreboard() : renderLedger(selected)}
      `;
      bindRenderedEvents();
    }

    function tabButton(id, label) {
      return `<button class="tab ${tab === id ? "active" : ""}" data-tab="${id}">${label}</button>`;
    }

    function renderLedger(selected) {
      return `
        <div class="toolbar">
          <div class="filters">
            ${filterChip("all", "All")}
            ${filterChip("overdue", "Overdue")}
            ${filterChip("soon", "Due soon")}
            ${CATEGORIES.map(c => filterChip(c.value, c.label)).join("")}
          </div>
        </div>
        <main class="grid">
          <section class="list">
            ${visibleBets().length ? visibleBets().map(renderBetCard).join("") : `<div class="empty">No bets here yet.</div>`}
          </section>
          <aside class="detail card">${selected ? renderDetail(selected) : "Select a bet to see the fine print."}</aside>
        </main>
      `;
    }

    function filterChip(id, label) {
      return `<button class="chip ${filter === id ? "active" : ""}" data-filter="${id}">${esc(label)}</button>`;
    }

    function statusBadge(bet) {
      if (bet.status === "settled") return `<span class="badge badge-green">Settled</span>`;
      if (bet.status === "voided") return `<span class="badge badge-red">Voided</span>`;
      if (bet.status === "ready") return `<span class="badge badge-amber">Ready</span>`;
      return `<span class="badge badge-blue">Open</span>`;
    }

    function renderBetCard(bet) {
      const due = dueStatus(bet);
      const tone = due.tone === "danger" ? "red" : due.tone === "warning" ? "amber" : "neutral";
      const partyNames = betParticipants(bet.id).map(p => p.member_name).join(" vs ");
      return `
        <article class="card bet-card ${selectedId === bet.id ? "selected" : ""}" data-select="${esc(bet.id)}">
          <div class="bet-top">
            <div>
              <div class="bet-title">${esc(bet.title)}</div>
              <div class="meta">${esc(partyNames || "No parties")} · ${esc(formatTerms(bet))}</div>
            </div>
            <div class="badges">
              ${statusBadge(bet)}
              <span class="badge badge-${tone}">${esc(due.label)}</span>
            </div>
          </div>
        </article>
      `;
    }

    function renderDetail(bet) {
      const partyList = betParticipants(bet.id);
      const winners = winnerIds(bet.id);
      return `
        <h2>${esc(bet.title)}</h2>
        <div class="badges" style="justify-content:flex-start;margin:8px 0;">
          ${statusBadge(bet)}
          <span class="badge badge-neutral">${esc(labelFor(CATEGORIES, bet.category))}</span>
          <span class="badge badge-neutral">${esc(labelFor(DISPUTE_RULES, bet.dispute_rule))}</span>
          ${bet.locked_at ? `<span class="badge badge-blue">Locked ${esc(formatRelativeDate(bet.locked_at))}</span>` : `<span class="badge badge-amber">Unlocked draft</span>`}
        </div>
        <div class="meta">${esc(formatTerms(bet))}${bet.review_date ? ` · Review ${esc(bet.review_date)}` : ""}</div>
        <div class="section-title">Predictions</div>
        <div class="participants">${partyList.map(p => renderParticipant(p, bet.status, winners.has(p.id))).join("")}</div>
        ${bet.outcome_summary ? `<div class="section-title">Outcome</div><div class="receipt">${esc(bet.outcome_summary)}</div>` : ""}
        <div class="section-title">Receipts</div>
        <div class="stack">${renderReceipts(bet.id)}</div>
        <div class="section-title">Amendments</div>
        <div class="stack">${renderAmendments(bet.id)}</div>
        <div class="modal-actions" style="justify-content:flex-start;">
          ${bet.status === "open" ? `<button class="btn btn-ghost btn-small" data-ready="${esc(bet.id)}">Ready to judge</button>` : ""}
          ${bet.status === "open" || bet.status === "ready" ? `<button class="btn btn-success btn-small" data-settle="${esc(bet.id)}">Settle</button><button class="btn btn-ghost btn-small" data-receipt="${esc(bet.id)}">Add receipt</button><button class="btn btn-ghost btn-small" data-amend="${esc(bet.id)}">Amend</button><button class="btn btn-danger btn-small" data-void="${esc(bet.id)}">Void</button>` : ""}
        </div>
      `;
    }

    function renderParticipant(p, status, isWinner) {
      return `
        <div class="participant ${status === "settled" && isWinner ? "winner" : ""}">
          <span class="avatar" style="background:${memberColor(p.member_id || p.member_name)}">${esc(initial(p.member_name))}</span>
          <div>
            <strong>${esc(p.member_name)} ${status === "settled" && isWinner ? "won" : ""}</strong>
            <div class="side">${esc(p.side_label)}</div>
            <div class="prediction">${esc(p.prediction)}</div>
          </div>
        </div>
      `;
    }

    function renderReceipts(betId) {
      const items = betEvidence(betId);
      if (!items.length) return `<div class="empty">No receipts yet.</div>`;
      return items.map(item => {
        const href = safeReceiptUrl(item.url);
        return `
          <div class="receipt">
            <strong>${esc(item.label)}</strong>
            <div class="meta">${esc(item.kind)} · ${esc(memberName(item.added_by))} · ${esc(formatRelativeDate(item.added_at))}</div>
            ${href ? `<div><a href="${esc(href)}" target="_blank" rel="noreferrer">${esc(href)}</a></div>` : ""}
            ${item.notes ? `<div class="prediction">${esc(item.notes)}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderAmendments(betId) {
      const items = betAmendments(betId);
      if (!items.length) return `<div class="empty">No amendments.</div>`;
      return items.map(item => `
        <div class="receipt">
          <div>${esc(item.body)}</div>
          <div class="meta">${esc(memberName(item.added_by))} · ${esc(formatRelativeDate(item.added_at))}</div>
        </div>
      `).join("");
    }

    function renderScoreboard() {
      const boardParticipants = participants.map(p => ({ ...p, is_winner: winnerIds(p.bet_id).has(p.id) }));
      const board = buildScoreboard(bets, boardParticipants);
      if (!board.length) return `<div class="empty">No predictions on the board yet.</div>`;
      return `
        <section class="card">
          <div class="score-row score-labels"><div>Person</div><div class="score-num">Right</div><div class="score-num">Wrong</div><div class="score-num">Open</div><div class="score-num">Void</div></div>
          ${board.map(row => `
            <div class="score-row">
              <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                <span class="avatar" style="background:${memberColor(row.member_id || row.name)}">${esc(initial(row.name))}</span>
                <strong style="overflow-wrap:anywhere;">${esc(row.name)}</strong>
              </div>
              <div class="score-num">${row.correct}</div>
              <div class="score-num">${row.incorrect}</div>
              <div class="score-num">${row.open}</div>
              <div class="score-num">${row.voided}</div>
            </div>
          `).join("")}
        </section>
      `;
    }

    function bindRenderedEvents() {
      root.querySelectorAll("[data-tab]").forEach(btn => btn.addEventListener("click", () => { tab = btn.dataset.tab; render(); }));
      root.querySelectorAll("[data-filter]").forEach(btn => btn.addEventListener("click", () => { filter = btn.dataset.filter; render(); }));
      root.querySelectorAll("[data-select]").forEach(card => card.addEventListener("click", () => { selectedId = card.dataset.select; render(); }));
      root.querySelectorAll("[data-ready]").forEach(btn => btn.addEventListener("click", () => markReady(btn.dataset.ready)));
      root.querySelectorAll("[data-void]").forEach(btn => btn.addEventListener("click", () => voidBet(btn.dataset.void)));
      root.querySelectorAll("[data-receipt]").forEach(btn => btn.addEventListener("click", () => openReceiptModal(btn.dataset.receipt)));
      root.querySelectorAll("[data-amend]").forEach(btn => btn.addEventListener("click", () => openAmendModal(btn.dataset.amend)));
      root.querySelectorAll("[data-settle]").forEach(btn => btn.addEventListener("click", () => openSettleModal(btn.dataset.settle)));
    }

    function modal(content) {
      const wrap = document.createElement("div");
      wrap.className = "modal-backdrop";
      wrap.innerHTML = `<div class="modal">${content}</div>`;
      wrap.addEventListener("click", e => { if (e.target === wrap) wrap.remove(); });
      document.body.appendChild(wrap);
      wrap.querySelector("[data-close]")?.addEventListener("click", () => wrap.remove());
      return wrap;
    }

    function optionList(items, selected = "") {
      return items.map(item => `<option value="${esc(item.value)}" ${item.value === selected ? "selected" : ""}>${esc(item.label)}</option>`).join("");
    }

    function memberOptions(selected = "") {
      return `<option value="">Custom name</option>${members.map(m => `<option value="${esc(m.id)}" ${m.id === selected ? "selected" : ""}>${esc(m.name)}</option>`).join("")}`;
    }

    function partyEditor(index, party = {}) {
      return `
        <div class="party-editor" data-party="${index}">
          <div class="form-grid">
            <div class="field"><label>Person</label><select data-party-member>${memberOptions(party.member_id || "")}</select></div>
            <div class="field"><label>Name</label><input data-party-name value="${esc(party.member_name || "")}" placeholder="Name" /></div>
          </div>
          <div class="field"><label>Side</label><input data-party-side value="${esc(party.side_label || "Prediction")}" /></div>
          <div class="field"><label>Prediction</label><textarea data-party-prediction placeholder="What do they think will happen?">${esc(party.prediction || "")}</textarea></div>
          ${index > 1 ? `<button class="btn btn-ghost btn-small" type="button" data-remove-party>Remove</button>` : ""}
        </div>
      `;
    }

    function openBetModal() {
      const wrap = modal(`
        <h3>New bet</h3>
        <div class="error" hidden></div>
        <div class="field"><label>Bet</label><input id="bet-title" placeholder="Will the remodel finish before Thanksgiving?" /></div>
        <div class="form-grid">
          <div class="field"><label>Category</label><select id="bet-category">${optionList(CATEGORIES, "wild_claims")}</select></div>
          <div class="field"><label>Review date</label><input id="bet-review" type="date" /></div>
          <div class="field"><label>Terms</label><select id="bet-terms">${optionList(TERM_TYPES, "bragging_rights")}</select></div>
          <div class="field"><label>House rule</label><select id="bet-rule">${optionList(DISPUTE_RULES, "all_parties")}</select></div>
        </div>
        <div class="field"><label>Wager or terms</label><textarea id="bet-terms-text" placeholder="Loser buys dinner, chore swap, trophy, or pure bragging rights."></textarea></div>
        <div class="section-title">Parties</div>
        <div id="party-list">${partyEditor(0)}${partyEditor(1)}</div>
        <button class="btn btn-ghost btn-small" type="button" id="add-party">Add party</button>
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px;text-transform:none;letter-spacing:0;font-size:.88rem;color:var(--text);">
          <input id="bet-locked" type="checkbox" checked style="width:auto;" /> Lock predictions immediately
        </label>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-close>Cancel</button>
          <button class="btn btn-primary" id="save-bet">Create bet</button>
        </div>
      `);
      let partyCount = 2;
      const list = wrap.querySelector("#party-list");
      wrap.querySelector("#add-party").addEventListener("click", () => {
        list.insertAdjacentHTML("beforeend", partyEditor(partyCount++));
        bindPartyControls(wrap);
      });
      bindPartyControls(wrap);
      wrap.querySelector("#save-bet").addEventListener("click", async () => {
        try {
          await saveBet(readBetDraft(wrap));
          wrap.remove();
        } catch (err) {
          const box = wrap.querySelector(".error");
          box.hidden = false;
          box.textContent = err.message;
        }
      });
    }

    function bindPartyControls(scope) {
      scope.querySelectorAll("[data-party-member]").forEach(select => {
        select.onchange = () => {
          const box = select.closest("[data-party]");
          const member = members.find(m => m.id === select.value);
          if (member) box.querySelector("[data-party-name]").value = member.name;
        };
      });
      scope.querySelectorAll("[data-remove-party]").forEach(btn => {
        btn.onclick = () => btn.closest("[data-party]").remove();
      });
    }

    function readBetDraft(scope) {
      return {
        title: scope.querySelector("#bet-title").value,
        category: scope.querySelector("#bet-category").value,
        terms_type: scope.querySelector("#bet-terms").value,
        terms_text: scope.querySelector("#bet-terms-text").value.trim(),
        review_date: scope.querySelector("#bet-review").value,
        dispute_rule: scope.querySelector("#bet-rule").value,
        locked: scope.querySelector("#bet-locked").checked,
        participants: [...scope.querySelectorAll("[data-party]")].map(box => ({
          member_id: box.querySelector("[data-party-member]").value,
          member_name: box.querySelector("[data-party-name]").value.trim(),
          side_label: box.querySelector("[data-party-side]").value.trim(),
          prediction: box.querySelector("[data-party-prediction]").value.trim(),
        })),
      };
    }

    function openReceiptModal(betId) {
      const wrap = modal(`
        <h3>Add receipt</h3><div class="error" hidden></div>
        <div class="form-grid">
          <div class="field"><label>Type</label><select id="receipt-kind"><option>note</option><option>link</option><option>photo</option><option>screenshot</option></select></div>
          <div class="field"><label>Name</label><input id="receipt-label" placeholder="Source, screenshot, article..." /></div>
        </div>
        <div class="field"><label>URL</label><input id="receipt-url" placeholder="https://..." /></div>
        <div class="field"><label>Notes</label><textarea id="receipt-notes"></textarea></div>
        <div class="modal-actions"><button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="save-receipt">Add</button></div>
      `);
      wrap.querySelector("#save-receipt").addEventListener("click", async () => {
        try {
          await addEvidence(betId, {
            kind: wrap.querySelector("#receipt-kind").value,
            label: wrap.querySelector("#receipt-label").value,
            url: wrap.querySelector("#receipt-url").value.trim(),
            notes: wrap.querySelector("#receipt-notes").value.trim(),
          });
          wrap.remove();
        } catch (err) { showModalError(wrap, err.message); }
      });
    }

    function openAmendModal(betId) {
      const wrap = modal(`
        <h3>Add amendment</h3><div class="error" hidden></div>
        <div class="field"><label>Amendment</label><textarea id="amend-body" placeholder="What changed, and who agreed?"></textarea></div>
        <div class="modal-actions"><button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="save-amend">Add</button></div>
      `);
      wrap.querySelector("#save-amend").addEventListener("click", async () => {
        try { await addAmendment(betId, wrap.querySelector("#amend-body").value); wrap.remove(); }
        catch (err) { showModalError(wrap, err.message); }
      });
    }

    function openSettleModal(betId) {
      const parties = betParticipants(betId);
      const wrap = modal(`
        <h3>Settle bet</h3><div class="error" hidden></div>
        <div class="section-title">Who was correct?</div>
        <div class="stack">${parties.map(p => `
          <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:.9rem;color:var(--text);">
            <input type="checkbox" value="${esc(p.id)}" data-winner style="width:auto;" /> ${esc(p.member_name)} — ${esc(p.side_label)}
          </label>
        `).join("")}</div>
        <div class="field" style="margin-top:12px;"><label>What happened?</label><textarea id="settle-summary" placeholder="Write the final ruling, source of truth, or partial-credit note."></textarea></div>
        <div class="modal-actions"><button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-success" id="save-settle">Settle</button></div>
      `);
      wrap.querySelector("#save-settle").addEventListener("click", async () => {
        try {
          const winners = [...wrap.querySelectorAll("[data-winner]:checked")].map(input => input.value);
          if (!winners.length) throw new Error("Pick at least one correct party.");
          await settleBet(betId, winners, wrap.querySelector("#settle-summary").value);
          wrap.remove();
        } catch (err) { showModalError(wrap, err.message); }
      });
    }

    function showModalError(wrap, message) {
      const box = wrap.querySelector(".error");
      box.hidden = false;
      box.textContent = message;
    }

    await loadMembers();
    await reload();
  </script>
</body>
</html>
